version: "3.9"

# HiGooya production stack — deploy on the Iranian VPS.
# `docker compose up -d` starts db + api + nightly backup.
# nginx on the host reverse-proxies /api → 127.0.0.1:3000 and serves dist/ + uploads/.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-higooya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-higooya}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-higooya}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-higooya}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-higooya}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      PORT: "3000"
      # Notifications
      BALE_BOT_TOKEN: ${BALE_BOT_TOKEN:-}
      BALE_ADMIN_CHAT_IDS: ${BALE_ADMIN_CHAT_IDS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
      TELEGRAM_ADMIN_CHAT_IDS: ${TELEGRAM_ADMIN_CHAT_IDS:-}
      # Pre-downloaded Prisma engines (see scripts/fetch-prisma-engines.ps1)
      # so `prisma generate` / `db push` never hit binaries.prisma.sh at deploy time.
      PRISMA_QUERY_ENGINE_LIBRARY: /app/prisma-engines/libquery_engine-linux-musl-openssl-3.0.x.so.node
      PRISMA_SCHEMA_ENGINE_BINARY: /app/prisma-engines/schema-engine-linux-musl-openssl-3.0.x
      PRISMA_CLI_BINARY_TARGETS: linux-musl-openssl-3.0.x
      # Payments (Phase 2)
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID:-}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://higooya.ir}
    command: >
      sh -c "set -e;
      if [ ! -f dist/index.js ]; then npx tsc -p tsconfig.json; fi;
      node dist/index.js"
    volumes:
      # Volume-mount code + deps so day-to-day updates are `git pull && docker-compose restart api`
      # (no image rebuild). node_modules must be built on the host once with the
      # Prisma musl engine present — see DEPLOY.md.
      - ./server/dist:/app/dist
      - ./server/src:/app/src:ro
      - ./server/node_modules:/app/node_modules
      - ./server/prisma:/app/prisma
      - ./server/package.json:/app/package.json:ro
      - ./server/package-lock.json:/app/package-lock.json:ro
      - ./server/tsconfig.json:/app/tsconfig.json:ro
      - ./server/prisma-engines:/app/prisma-engines:ro
      - ./uploads:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"

  backup:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-higooya}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-higooya}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-}
    volumes:
      - ./backups:/backups
      - ./uploads:/uploads:ro
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "apk add --no-cache postgresql16-client tar gzip rclone tzdata &&
       cp /usr/share/zoneinfo/Asia/Tehran /etc/localtime &&
       echo '0 3 * * * /bin/sh /backup.sh >> /backups/backup.log 2>&1' | crontab - &&
       crond -f -l 8"
